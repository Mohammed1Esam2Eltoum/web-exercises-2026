<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Price Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <h2>Fuel Expense Estimator</h2>

        <section class="input-group">
            <label for="unitPrice">Price per L (£):</label>
            <input type="number" id="unitPrice" step="0.01" value="1.72">
        </section>

        <section class="input-group">
            <label for="volume">Liters added:</label>
            <input type="number" id="volume" step="0.1" value="0">
        </section>

        <button id="runCalculation">Show Total Amount</button>

        <div id="displayOutput">Amount Due: £0.00</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
